apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: observascore
spec:
  selector:
    app: observascore
    tier: backend
  ports:
    - protocol: TCP
      port: 5000
      targetPort: 5000
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: observascore
spec:
  selector:
    app: observascore
    tier: frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: LoadBalancer
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb-service
  namespace: observascore
spec:
  selector:
    app: observascore
    tier: database
  ports:
    - protocol: TCP
      port: 27017
      targetPort: 27017
  type: ClusterIP
