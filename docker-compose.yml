version: '3.8'

services:
  frontend:
    build:
      context: ./src/main/frontend
      dockerfile: ../../infrastructure/docker/Dockerfile.frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - observascore-net
    restart: unless-stopped

  backend:
    build:
      context: ./src/main/backend
      dockerfile: ../../infrastructure/docker/Dockerfile.backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/observascore
      - FRONTEND_URL=http://localhost:3000
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - observascore-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  mongodb:
    image: mongo:6.0
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./infrastructure/docker/mongo-init.js:/docker-entrypoint-initdb.d/init.js:ro
    networks:
      - observascore-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  monitoring:
    image: nagios/nagios:latest
    ports:
      - "8081:80"
    volumes:
      - ./monitoring/nagios:/opt/nagios/etc/conf.d
    networks:
      - observascore-net
    restart: unless-stopped

volumes:
  mongo_data:
    driver: local

networks:
  observascore-net:
    driver: bridge
