# ObservaScore Nagios Monitoring Configuration
# Author: Harshitt Singhrowa | Reg: 23FE10CSE00838

define host {
    use                     linux-server
    host_name               observascore-backend
    alias                   ObservaScore Backend API
    address                 backend
    max_check_attempts      3
    check_period            24x7
    notification_interval   60
    notification_period     24x7
}

define host {
    use                     linux-server
    host_name               observascore-frontend
    alias                   ObservaScore Frontend
    address                 frontend
    max_check_attempts      3
    check_period            24x7
    notification_interval   60
    notification_period     24x7
}

define host {
    use                     linux-server
    host_name               observascore-mongodb
    alias                   ObservaScore MongoDB
    address                 mongodb
    max_check_attempts      3
    check_period            24x7
    notification_interval   60
    notification_period     24x7
}

# Service checks
define service {
    use                     generic-service
    host_name               observascore-backend
    service_description     HTTP Health Check
    check_command           check_http!-u /api/health -p 5000
    normal_check_interval   2
    retry_check_interval    1
}

define service {
    use                     generic-service
    host_name               observascore-backend
    service_description     API Response Time
    check_command           check_http!-u /api/health -p 5000 -w 2 -c 5
    normal_check_interval   5
}

define service {
    use                     generic-service
    host_name               observascore-frontend
    service_description     Frontend HTTP
    check_command           check_http!-p 80
    normal_check_interval   2
}

define service {
    use                     generic-service
    host_name               observascore-mongodb
    service_description     MongoDB Port
    check_command           check_tcp!27017
    normal_check_interval   5
}

# Contact for alerts
define contact {
    contact_name            harshitt
    use                     generic-contact
    alias                   Harshitt Singhrowa
    email                   harshittsinghrowa@example.com
}

define contactgroup {
    contactgroup_name       observascore-team
    alias                   ObservaScore Dev Team
    members                 harshitt
}
